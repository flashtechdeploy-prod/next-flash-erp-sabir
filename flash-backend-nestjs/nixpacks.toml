[install]
pkgManager = "npm"

[build]
cmds = [
  "npm install --verbose",
  "npm run build -- --verbose",
  "ls -la dist || echo 'ERROR: dist folder not created'",
  "test -d dist || exit 1"
]

[start]
cmd = "npm run start:prod"

[env]
NODE_ENV = "production"

[processes]
web = "npm run start:prod"
